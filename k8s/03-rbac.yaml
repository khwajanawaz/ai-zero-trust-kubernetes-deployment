apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployment-worker
  namespace: ai-zero-trust

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-worker-role
  namespace: ai-zero-trust
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch

  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-worker-rolebinding
  namespace: ai-zero-trust
subjects:
  - kind: ServiceAccount
    name: deployment-worker
    namespace: ai-zero-trust
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployment-worker-role

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deployment-worker-cluster-reader
rules:
  - apiGroups: [""]
    resources:
      - namespaces
    verbs:
      - get
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deployment-worker-cluster-reader-binding
subjects:
  - kind: ServiceAccount
    name: deployment-worker
    namespace: ai-zero-trust
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: deployment-worker-cluster-reader
