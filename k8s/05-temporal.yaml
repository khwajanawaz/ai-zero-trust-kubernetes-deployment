apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: ai-zero-trust
spec:
  selector:
    app: temporal
  ports:
    - name: frontend
      port: 7233
      targetPort: 7233
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: ai-zero-trust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done

      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 7233
              name: frontend

          env:
            - name: DB
              value: "postgres12"

            - name: DB_PORT
              value: "5432"

            - name: POSTGRES_SEEDS
              value: "postgres"

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ai-zero-trust-secrets
                  key: POSTGRES_USER

            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: ai-zero-trust-secrets
                  key: POSTGRES_PASSWORD

            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"

            - name: TEMPORAL_CLI_ADDRESS
              value: "temporal:7233"


          startupProbe:
            tcpSocket:
              port: 7233
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 7233
            periodSeconds: 10
            failureThreshold: 6

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1500Mi"
