apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: ai-zero-trust
spec:
  selector:
    app: temporal-ui
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: ai-zero-trust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false

      containers:
        - name: temporal-ui
          image: temporalio/ui:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"

            - name: TEMPORAL_UI_PORT
              value: "8080"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "384Mi"
